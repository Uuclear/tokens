name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x86_64
            ext: zip
            bin: tokens.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64-gnu
            ext: tar.gz
            bin: tokens
          - os: macos-latest
            target: macos-universal
            artifact: macos-universal
            ext: tar.gz
            bin: tokens

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (Windows / Linux)
        if: matrix.target != 'macos-universal'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (macOS universal)
        if: matrix.target == 'macos-universal'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/tokens \
            target/x86_64-apple-darwin/release/tokens \
            -output target/tokens-universal

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          if ($ver -eq '' -or $ver -eq $null) { $ver = "${{ inputs.tag }}" }
          $dir = "dist/tokens-$ver-${{ matrix.artifact }}"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$dir/"
          Copy-Item README.md, LICENSE "$dir/"
          Copy-Item -Recurse docs/install-windows.md "$dir/使用说明-Windows.md"
          Compress-Archive -Path $dir -DestinationPath "dist/tokens-$ver-${{ matrix.artifact }}.zip"

      - name: Package Unix
        if: matrix.os != 'windows-latest'
        run: |
          VER="${{ github.ref_name }}"
          if [ -z "$VER" ]; then VER="${{ inputs.tag }}"; fi
          NAME="tokens-${VER}-${{ matrix.artifact }}"
          mkdir -p "dist/${NAME}"
          if [ "${{ matrix.target }}" = "macos-universal" ]; then
            cp target/tokens-universal "dist/${NAME}/${{ matrix.bin }}"
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${NAME}/${{ matrix.bin }}"
          fi
          cp README.md LICENSE "dist/${NAME}/"
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp docs/install-macos.md "dist/${NAME}/使用说明-macOS.md"
          else
            cp docs/install-linux.md "dist/${NAME}/使用说明-Linux.md"
          fi
          tar -czf "dist/${NAME}.tar.gz" -C dist "${NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
